name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

# Top-level permissions must be at least as broad as anything the reusable
# test.yml chain (which includes a publish-results job needing checks:write
# and pull-requests:write) requests — otherwise the whole workflow hits
# `startup_failure` before any job runs.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Build distributions
        run: uv build
      - name: Check package
        run: uv run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/stays
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
