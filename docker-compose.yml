services:
  stays:
    image: ghcr.io/him229/stays:latest
    container_name: stays
    profiles: [prod]
    ports:
      - "8000:8000"
    environment:
      - STAYS_RPS=10
      - HOST=0.0.0.0
      - PORT=8000
    healthcheck:
      # MCP streamable HTTP rejects bare GET with 405/406 — TCP reachability
      # on the listening port is a sufficient liveness signal.
      test: ["CMD", "python", "-c", "import socket, sys; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  stays-dev:
    build: .
    container_name: stays-dev
    profiles: [dev]
    ports:
      - "8000:8000"
    environment:
      - STAYS_RPS=10
      - HOST=0.0.0.0
      - PORT=8000
    restart: "no"
